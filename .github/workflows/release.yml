name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  # Required to issue build provenance. This is supply-chain evidence a
  # regulated buyer can verify independently: it binds each artifact to the
  # exact source commit and workflow that produced it. Code signing proves who
  # compiled a binary; provenance proves what it was compiled from.
  id-token: write
  attestations: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          # Pinned to an exact patch. A floating '1.26' silently picks up new
          # patch releases, and a different toolchain produces a different
          # binary — which would break byte-for-byte verification without any
          # visible change to this repository.
          go-version: '1.26.5'

      # Releases are gated on the full suite: a tagged binary that fails its
      # own tests should never reach a download page.
      - name: Test
        run: |
          go vet ./...
          # Linux runner, so cgo is available for the race detector.
          go test -race ./...

      - name: Verify control catalogue
        # Startup validates every check's control codes against the embedded
        # ECC catalogue and exits 2 on an unknown code.
        run: go run ./cmd/scanner -list

      - name: Build release artifacts
        env:
          # -trimpath and a cleared build id remove absolute paths and the
          # build id from output. Together with a pinned toolchain this makes
          # builds reproducible ON THE SAME HOST PLATFORM — cross-compiling
          # the same target from a different OS was measured to produce a
          # different binary, so verification must match the runner.
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          # Reproduction requires matching the build environment, so publish it
          # rather than expecting anyone to guess.
          {
            echo "Go:      $(go version)"
            echo "Runner:  ${{ runner.os }} / $(uname -srm)"
            echo "Commit:  ${GITHUB_SHA}"
            echo "Tag:     ${VERSION}"
          } > dist/BUILDINFO.txt
          cat dist/BUILDINFO.txt

          build() {
            local goos=$1 goarch=$2 ext=$3
            GOOS=$goos GOARCH=$goarch go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -buildid=" \
              -o "dist/athar-${goos}-${goarch}${ext}" ./cmd/scanner
            GOOS=$goos GOARCH=$goarch go build \
              -trimpath \
              -ldflags "-s -w -buildid=" \
              -o "dist/athar-report-${goos}-${goarch}${ext}" ./cmd/report
            GOOS=$goos GOARCH=$goarch go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -buildid=" \
              -o "dist/athar-cloud-${goos}-${goarch}${ext}" ./cmd/athar-cloud
          }

          build windows amd64 .exe
          build linux   amd64 ""
          build linux   arm64 ""

      - name: Generate SBOM
        # Procurement at regulated buyers increasingly requires a software bill
        # of materials before a binary is permitted into an estate. Generating
        # it from the module graph keeps it accurate rather than aspirational.
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod app -json -licenses -output dist/athar-sbom.cdx.json -main ./cmd/scanner .
          echo "--- SBOM components ---"
          grep -o '"name"' dist/athar-sbom.cdx.json | wc -l

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/athar-*'

      - name: Checksum artifacts
        run: |
          cd dist
          rm -f SHA256SUMS
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Verifying this download

            Athar is not yet code signed, so Windows SmartScreen will warn on
            first run and AppLocker or WDAC will block it unless allowlisted.
            Until signing is in place, verify the binary by hash:

            ```sh
            sha256sum -c SHA256SUMS          # Linux
            Get-FileHash athar-windows-amd64.exe -Algorithm SHA256   # Windows
            ```

            ## Reproducing these builds

            You are not required to trust these artifacts. They are built in
            public CI from this tag with `-trimpath`, a cleared build id and a
            pinned toolchain, and can be rebuilt and compared.

            Reproduction requires **matching the build environment**, which is
            recorded in `BUILDINFO.txt`. Building the same target from a
            different host operating system produces a different binary even
            with identical source, toolchain version and flags — this was
            measured, not assumed. To verify, build on the same OS as the
            runner:

            ```sh
            git checkout <tag>
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
              -trimpath -ldflags "-s -w -X main.version=<tag> -buildid=" \
              -o athar ./cmd/scanner
            sha256sum athar
            ```

            ## What this release does

            Read-only, offline compliance scanning against NCA ECC-2:2024. It
            makes no network calls, executes no shell, handles no credentials,
            and writes nothing to the scanned host except the report you ask
            for.

            See [SECURITY.md](SECURITY.md) for the security scope and
            [CONTRIBUTING.md](CONTRIBUTING.md) for the accuracy standard checks
            are held to.
