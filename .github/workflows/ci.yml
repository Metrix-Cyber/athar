name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and vet
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Both platforms run the full suite: the Linux parsers are tested on
        # Windows too, since contributors on Windows cannot otherwise exercise
        # that code at all.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - run: go vet ./...

      # The race detector requires cgo, which the Windows runner has no
      # compiler configured for. Enabling cgo there just to satisfy it would
      # test a configuration the project does not ship — releases are built
      # with CGO_ENABLED=0 — so race detection runs where it is available and
      # the same tests run everywhere.
      - name: Test (with race detector)
        if: runner.os == 'Linux'
        run: go test -race -coverprofile=coverage.out ./...

      - name: Report coverage
        if: runner.os == 'Linux'
        # Printed rather than gated. A coverage threshold on a codebase whose
        # riskiest code is unreachable in CI — registry reads, syscalls, live
        # tenants — would measure the wrong thing and invite writing tests that
        # satisfy the number instead of the risk.
        run: |
          go tool cover -func=coverage.out | tail -1
          echo "--- per package ---"
          go test -cover ./... 2>&1 | grep -E "coverage:|no test files"

      - name: Test
        if: runner.os != 'Linux'
        run: go test ./...

      - name: Verify formatting
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  build:
    name: Cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Build all targets
        run: |
          for target in windows/amd64 linux/amd64 linux/arm64; do
            for cmd in scanner report athar-cloud; do
              GOOS=${target%/*} GOARCH=${target#*/} \
                go build -ldflags "-s -w" -o "/tmp/${cmd}-${target////-}" "./cmd/${cmd}"
            done
            echo "built $target"
          done

      - name: Smoke test the control catalogue
        # Startup validates every check's control codes against the embedded
        # ECC catalogue and exits 2 on an unknown code. This turns a wrong
        # framework mapping into a failed build rather than a wrong finding in
        # a customer's report.
        run: |
          go run ./cmd/scanner -list

  vulnerabilities:
    name: Known vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Scan dependencies and standard library
        # govulncheck reports only vulnerabilities whose affected code is
        # actually reachable from this binary, rather than every CVE touching a
        # dependency. That distinction matters: an unreachable advisory is
        # noise, and noise is what makes teams disable a gate.
        #
        # It also covers the Go standard library, which is where a binary with
        # three dependencies is most likely to inherit a real one.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  licences:
    name: Dependency licences
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Reject copyleft dependencies
        # The scanner is distributed as a binary to third parties, so a
        # GPL-family dependency would impose obligations on that distribution.
        # Enforced here rather than remembered.
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... \
            --disallowed_types=forbidden,restricted,reciprocal \
            || { echo "A dependency carries a copyleft or unknown licence."; exit 1; }
